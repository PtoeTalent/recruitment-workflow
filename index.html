<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contractual Recruitment Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --cream: #faf7f2;
    --gold: #c9a84c;
    --mist: #e8e2d9;
    --step1: #2e7ab0;
    --step2: #4a7c6f;
    --step3: #c9a84c;
    --step4: #c45c3a;
    --step5: #6b5b8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 15% 25%, rgba(46,122,176,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 75%, rgba(107,91,138,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.7s ease both;
  }

  .header-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--step1);
    border: 1px solid var(--step1);
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 15px;
    color: #666;
    font-weight: 300;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .progress-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 4px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .prog-step {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }

  .prog-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.3s ease;
    border: 2px solid var(--mist);
    color: #aaa;
    background: white;
  }

  .prog-step.active .prog-dot,
  .prog-step.done .prog-dot {
    border-color: transparent;
    color: white;
  }

  .prog-step[data-step="1"].active .prog-dot,
  .prog-step[data-step="1"].done .prog-dot { background: var(--step1); }
  .prog-step[data-step="2"].active .prog-dot,
  .prog-step[data-step="2"].done .prog-dot { background: var(--step2); }
  .prog-step[data-step="3"].active .prog-dot,
  .prog-step[data-step="3"].done .prog-dot { background: var(--step3); }
  .prog-step[data-step="4"].active .prog-dot,
  .prog-step[data-step="4"].done .prog-dot { background: var(--step4); }
  .prog-step[data-step="5"].active .prog-dot,
  .prog-step[data-step="5"].done .prog-dot { background: var(--step5); }

  .prog-line {
    width: 32px;
    height: 2px;
    background: var(--mist);
    transition: background 0.3s ease;
  }

  .prog-line.filled { background: var(--step1); }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .step-card {
    background: white;
    border-radius: 16px;
    border: 1.5px solid var(--mist);
    overflow: hidden;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    animation: fadeUp 0.5s ease both;
  }

  .step-card:nth-child(1) { animation-delay: 0.1s; }
  .step-card:nth-child(2) { animation-delay: 0.2s; }
  .step-card:nth-child(3) { animation-delay: 0.3s; }
  .step-card:nth-child(4) { animation-delay: 0.4s; }
  .step-card:nth-child(5) { animation-delay: 0.5s; }

  .step-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }

  .step-card.open { box-shadow: 0 12px 40px rgba(0,0,0,0.10); }

  .step-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .step-num {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .step-card[data-step="1"] .step-num { background: var(--step1); }
  .step-card[data-step="2"] .step-num { background: var(--step2); }
  .step-card[data-step="3"] .step-num { background: var(--step3); }
  .step-card[data-step="4"] .step-num { background: var(--step4); }
  .step-card[data-step="5"] .step-num { background: var(--step5); }

  .step-title-block { flex: 1; }

  .step-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 3px;
  }

  .step-meta { font-size: 12px; color: #999; font-weight: 300; }

  .step-toggle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--mist);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #aaa;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .step-card.open .step-toggle { transform: rotate(180deg); border-color: #ccc; color: #666; }

  .step-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .step-card.open .step-body { max-height: 900px; }

  .step-inner {
    padding: 20px 24px 24px;
    border-top: 1.5px solid var(--mist);
  }

  .checklist {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    line-height: 1.5;
    color: #444;
  }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--mist);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    margin-top: 1px;
    background: white;
    font-size: 12px;
  }

  .check-box.checked { border-color: transparent; color: white; }

  .step-card[data-step="1"] .check-box.checked { background: var(--step1); }
  .step-card[data-step="2"] .check-box.checked { background: var(--step2); }
  .step-card[data-step="3"] .check-box.checked { background: var(--step3); }
  .step-card[data-step="4"] .check-box.checked { background: var(--step4); }
  .step-card[data-step="5"] .check-box.checked { background: var(--step5); }

  .check-label { cursor: pointer; }
  .check-label.done { text-decoration: line-through; color: #bbb; }

  .tip-box {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    border-left: 3px solid var(--gold);
  }

  .tip-box strong {
    color: var(--ink);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }

  .overall-progress {
    margin-top: 40px;
    background: white;
    border-radius: 16px;
    padding: 24px;
    border: 1.5px solid var(--mist);
    animation: fadeUp 0.5s 0.6s ease both;
  }

  .overall-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .overall-label span:first-child {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
  }

  .overall-label span:last-child { font-size: 13px; color: var(--step1); font-weight: 500; }

  .bar-track { height: 8px; background: var(--mist); border-radius: 99px; overflow: hidden; }

  .bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--step1), var(--step2), var(--step5));
    transition: width 0.5s ease;
    width: 0%;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .prog-line { width: 18px; }
    .step-header { padding: 16px; }
    .step-inner { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="header-label">Small Business · Contractual Hiring</div>
    <h1>Contractor Recruitment<br>Workflow</h1>
    <p class="subtitle">A step-by-step process for finding, vetting, and engaging freelancers and contractors for project-based work.</p>
  </header>

  <div class="progress-bar" id="progressBar"></div>
  <div class="steps" id="steps"></div>

  <div class="overall-progress">
    <div class="overall-label">
      <span>Overall Progress</span>
      <span id="progressPct">0% complete</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>

</div>

<script>
const stepsData = [
  {
    id: 1,
    title: "Define the Scope of Work",
    meta: "Clarify the need · Set expectations",
    tasks: [
      "Identify the specific project or task requiring a contractor",
      "Write a clear Scope of Work (SOW): deliverables, timelines, quality standards",
      "Define the skills, tools, or expertise required",
      "Set the budget range (fixed price or hourly rate)",
      "Determine contract duration and expected end date",
      "Get internal approval if required (budget sign-off)"
    ],
    tip: "💡 A vague scope is the #1 cause of contractor disputes. The more specific the SOW, the smoother the engagement."
  },
  {
    id: 2,
    title: "Source & Post the Opportunity",
    meta: "OnlineJobs.ph · LinkedIn · Referrals",
    tasks: [
      "Post the role on OnlineJobs.ph — create a clear job post with title, scope, rate, and how to apply",
      "Share the opportunity on LinkedIn — post on your profile and in relevant groups",
      "Activate referrals — inform your network, colleagues, and past contractors you're looking",
      "Write a clear project brief for each channel: deliverables, timeline, budget, and requirements",
      "Specify any non-negotiables: NDA, tools required, availability, and communication expectations",
      "Set a response or application deadline across all channels"
    ],
    tip: "💡 OnlineJobs.ph is great for finding dedicated Filipino contractors. LinkedIn works well for specialized or senior roles. Referrals from people you trust are often the fastest and most reliable."
  },
  {
    id: 3,
    title: "Screen & Shortlist Candidates",
    meta: "Review proposals · Select the best fit",
    tasks: [
      "Review proposals or profiles against your defined requirements",
      "Check portfolio, past work samples, and relevant experience",
      "Verify reviews or ratings if using a freelance platform",
      "Shortlist top 3–5 contractors for further evaluation",
      "Confirm availability aligns with your project timeline",
      "Reach out to shortlisted candidates to confirm interest and ask initial questions"
    ],
    tip: "💡 Past work and client reviews are your best predictor of quality — prioritize these over a polished pitch."
  },
  {
    id: 4,
    title: "Interview & Select",
    meta: "Validate fit · Agree on terms",
    tasks: [
      "Conduct a short call or async Q&A to assess communication and understanding",
      "Discuss the project scope and confirm they understand the deliverables",
      "Ask for a small paid test task if the project is large or high-risk",
      "Clarify rate, payment schedule, and revision policy",
      "Confirm preferred communication tools and availability/hours",
      "Select the contractor and notify unsuccessful candidates"
    ],
    tip: "💡 A paid test task (even a small one) reveals more about a contractor's quality and reliability than any interview."
  },
  {
    id: 5,
    title: "Contract, Onboard & Manage",
    meta: "Lock it in · Set them up for success",
    tasks: [
      "Draft and send a formal contract (scope, payment, IP ownership, confidentiality)",
      "Ensure contract is signed by both parties before any work begins",
      "Share all relevant files, access, brand assets, or tools needed",
      "Set up a kickoff meeting or briefing to align on expectations",
      "Agree on milestone check-ins and feedback cycles",
      "Define the invoicing and payment process clearly",
      "Document and file the contract for record-keeping"
    ],
    tip: "💡 Always ensure IP/ownership clauses are explicit in the contract — who owns the final deliverable must be crystal clear."
  }
];

let checkedState = {};
let openSteps = new Set([1]);

function totalTasks() {
  return stepsData.reduce((acc, s) => acc + s.tasks.length, 0);
}

function totalChecked() {
  return Object.values(checkedState).filter(Boolean).length;
}

function updateProgress() {
  const pct = Math.round((totalChecked() / totalTasks()) * 100);
  document.getElementById('progressPct').textContent = pct + '% complete';
  document.getElementById('barFill').style.width = pct + '%';

  stepsData.forEach(s => {
    const allKeys = s.tasks.map((_, i) => `${s.id}-${i}`);
    const allDone = allKeys.every(k => checkedState[k]);
    const anyDone = allKeys.some(k => checkedState[k]);
    const dot = document.querySelector(`.prog-step[data-step="${s.id}"] .prog-dot`);
    const prog = document.querySelector(`.prog-step[data-step="${s.id}"]`);
    if (dot) {
      dot.textContent = allDone ? '✓' : s.id;
      prog.classList.toggle('done', allDone);
      prog.classList.toggle('active', !allDone && (openSteps.has(s.id) || anyDone));
    }
  });

  document.querySelectorAll('.prog-line').forEach((line, i) => {
    const step = stepsData[i];
    const allKeys = step.tasks.map((_, j) => `${step.id}-${j}`);
    line.classList.toggle('filled', allKeys.every(k => checkedState[k]));
  });
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  stepsData.forEach((s, i) => {
    const stepEl = document.createElement('div');
    stepEl.className = 'prog-step';
    stepEl.dataset.step = s.id;
    stepEl.innerHTML = `<div class="prog-dot">${s.id}</div>`;
    stepEl.addEventListener('click', () => toggleStep(s.id));
    bar.appendChild(stepEl);
    if (i < stepsData.length - 1) {
      const line = document.createElement('div');
      line.className = 'prog-line';
      bar.appendChild(line);
    }
  });
}

function toggleStep(id) {
  if (openSteps.has(id)) openSteps.delete(id);
  else openSteps.add(id);
  renderSteps();
  updateProgress();
}

function toggleTask(stepId, taskIdx) {
  const key = `${stepId}-${taskIdx}`;
  checkedState[key] = !checkedState[key];
  renderSteps();
  updateProgress();
}

function renderSteps() {
  const container = document.getElementById('steps');
  container.innerHTML = '';
  stepsData.forEach(s => {
    const isOpen = openSteps.has(s.id);
    const card = document.createElement('div');
    card.className = `step-card${isOpen ? ' open' : ''}`;
    card.dataset.step = s.id;
    const checkedCount = s.tasks.filter((_, i) => checkedState[`${s.id}-${i}`]).length;
    card.innerHTML = `
      <div class="step-header" onclick="toggleStep(${s.id})">
        <div class="step-num">${s.id}</div>
        <div class="step-title-block">
          <div class="step-title">${s.title}</div>
          <div class="step-meta">${s.meta} · ${checkedCount}/${s.tasks.length} done</div>
        </div>
        <div class="step-toggle">▾</div>
      </div>
      <div class="step-body">
        <div class="step-inner">
          <ul class="checklist">
            ${s.tasks.map((task, i) => {
              const key = `${s.id}-${i}`;
              const checked = checkedState[key];
              return `<li>
                <div class="check-box ${checked ? 'checked' : ''}" onclick="toggleTask(${s.id}, ${i})">${checked ? '✓' : ''}</div>
                <span class="check-label ${checked ? 'done' : ''}" onclick="toggleTask(${s.id}, ${i})">${task}</span>
              </li>`;
            }).join('')}
          </ul>
          <div class="tip-box">
            <strong>Pro Tip</strong>
            ${s.tip}
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

renderProgress();
renderSteps();
updateProgress();
</script>
</body>
</html>
